name: Build EXE
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Compile UnDefend.cpp
      run: cl.exe /EHsc /W4 /Fe:UnDefend.exe UnDefend.cpp

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        path: UnDefend.exe   
